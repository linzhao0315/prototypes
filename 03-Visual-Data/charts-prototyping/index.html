<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prototypes</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 48px;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    h1 {
      font-size: 22px;
      font-weight: 600;
      color: #111;
      margin-bottom: 8px;
    }
    p {
      font-size: 14px;
      color: #888;
      margin-bottom: 32px;
    }
    .card {
      display: block;
      text-decoration: none;
      border: 1.5px solid #e8e8e8;
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 16px;
      transition: all 0.2s ease;
      color: inherit;
    }
    .card:hover {
      border-color: #111;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      transform: translateY(-1px);
    }
    .card-title {
      font-size: 15px;
      font-weight: 500;
      color: #111;
      margin-bottom: 4px;
    }
    .card-desc {
      font-size: 13px;
      color: #999;
    }
    .arrow {
      float: right;
      color: #ccc;
      font-size: 18px;
      margin-top: -2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Prototypes</h1>
    <p>Click to view</p>
    <a class="card" href="donation-impact-preview.html">
      <span class="arrow">→</span>
      <div class="card-title">📊 Donation Impact</div>
      <div class="card-desc">Impact visualization prototype</div>
    </a>
    <a class="card" href="test-analytics-prototype.html">
      <span class="arrow">→</span>
      <div class="card-title">📈 Analytics</div>
      <div class="card-desc">Analytics dashboard prototype</div>
    </a>
  </div>
</body>
</html>
